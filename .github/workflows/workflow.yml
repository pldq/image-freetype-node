name: build-and-release
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  native-build-and-test:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        target: [ Release, Debug ]
        node-version: [ '24.x' ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Get submodule status hash
        id: submodule
        shell: bash
        run: |
          HASH=$(git submodule status --recursive | sha256sum | cut -d ' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
      - name: Setting opencv artifact build environments
        id: opencv-artifact-env
        shell: bash
        env:
          OPENCV_DIR: ${{ github.workspace }}/deps/${{ matrix.target }}/opencv
          OPENCV_CMAKE_FIND_SUFFIX: ${{ case(runner.os == 'Linux' || runner.os == 'macOS', '/lib/cmake/opencv4', '') }}
        run: |
          echo "OPENCV_BUILD_DIR=${{ env.OPENCV_DIR }}" >> $GITHUB_OUTPUT
          echo "OPENCV_CMAKE_FIND_DIR=${{ env.OPENCV_DIR }}${{ env.OPENCV_CMAKE_FIND_SUFFIX }}" >> $GITHUB_OUTPUT
      - name: Cache opencv artifact
        id: cache-opencv-artifact
        uses: actions/cache@v5
        env:
          CACHE_NAME: cache-opencv-artifact
        with:
          path: ${{ steps.opencv-artifact-env.outputs.OPENCV_BUILD_DIR }}
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ env.CACHE_NAME }}-${{ steps.submodule.outputs.hash }}
      - name: Grant execute permission to build script
        if: ${{ steps.cache-opencv-artifact.outputs.cache-hit != 'true' && (runner.os == 'Linux' || runner.os == 'macOS') }}
        working-directory: ./script
        run: chmod +x ./build.sh
      - name: Run build.sh on ${{ runner.os }}
        env:
          RUN_SCRIPT_FILE: ${{ case(runner.os == 'Linux' || runner.os == 'macOS', './build.sh', './build.ps1') }}
        if: ${{ steps.cache-opencv-artifact.outputs.cache-hit != 'true' }}
        working-directory: ./script
        run: ${{ env.RUN_SCRIPT_FILE }} ${{ matrix.target }}
      - name: Upload opencv artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deps-opencv-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ github.ref_name }}
          path: ${{ steps.opencv-artifact-env.outputs.OPENCV_BUILD_DIR }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true
      - name: Build native watermark
        id: build-native-watermark
        shell: bash
        env:
          BUILD_DIR: ${{ github.workspace }}/deps/${{ matrix.target }}/watermark
          GENERATE_DIR: ${{ github.workspace }}/deps/${{ matrix.target }}/generated/watermark
        run: |
          echo "NATIVE_WATERMARK_GENERATE_DIR=${{ env.GENERATE_DIR }}" >> $GITHUB_OUTPUT
          echo "NATIVE_WATERMARK_BUILD_DIR=${{ env.GENERATE_DIR }}" >> $GITHUB_OUTPUT
          cmake -B "${{ env.GENERATE_DIR }}" -DOpenCV_DIR="${{ steps.opencv-artifact-env.outputs.OPENCV_CMAKE_FIND_DIR }}" -DCMAKE_BUILD_TYPE="${{ matrix.target }}" -DCMAKE_INSTALL_PREFIX="${{ env.BUILD_DIR }}" .
          cmake --build "${{ env.GENERATE_DIR }}" -j --config "${{ matrix.target }}" --target install
      - name: Test native watermark
        uses: threeal/ctest-action@v1.1.0
        with:
          build-config: ${{ matrix.target }}
          test-dir: ${{ steps.build-native-watermark.outputs.NATIVE_WATERMARK_GENERATE_DIR }}
          verbose: true
      - name: Upload native watermark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: native-watermark-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ github.ref_name }}
          path: ${{ steps.build-native-watermark.outputs.NATIVE_WATERMARK_BUILD_DIR }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true
      - name: prebuild-node-addon
        if: ${{ matrix.target == 'Release' }}
        uses: ./.github/actions/prebuild-node-addon-action
        with:
          opencv-cmake-find-dir: ${{ steps.opencv-artifact-env.outputs.OPENCV_CMAKE_FIND_SUFFIX }}
  bundle:
    name: Bundle prebuilds
    needs: native-build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: addon-watermark-*
          path: tmp
      - name: Display structure of downloaded files
        run: |
          mkdir addon
          mv tmp/*/* addon/
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: image-freetype-node-addon
          path: addon
          retention-days: 7
