name: build-and-release
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  native-deps-build:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        target: [ Release, Debug ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Get submodule status hash
        id: submodule
        shell: bash
        run: |
          HASH=$(git submodule status --recursive | sha256sum | cut -d ' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
      - name: Cache opencv artifact
        id: cache-opencv-artifact
        uses: actions/cache@v4
        env:
          CACHE_NAME: cache-opencv-artifact
        with:
          path: ./deps/${{ matrix.target }}/opencv
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ env.CACHE_NAME }}-${{ steps.submodule.outputs.hash }}
      - name: Grant execute permission to build script
        if: ${{ steps.cache-opencv-artifact.outputs.cache-hit != 'true' }}
        working-directory: ./script
        run: chmod +x ./build.sh
      - name: Run build.sh on ${{ runner.os }}
        env:
          RUN_SCRIPT_FILE: ${{ case(runner.os == 'Linux' || runner.os == 'macOS', './build.sh', './build.ps1') }}
        if: ${{ steps.cache-opencv-artifact.outputs.cache-hit != 'true' }}
        working-directory: ./script
        run: ${{ env.RUN_SCRIPT_FILE }} ${{ matrix.target }}
      - name: Build native watermark
        shell: bash
        env:
          BUILD_DIR: ${{ github.workspace }}/deps/${{ matrix.target }}/watermark
          GENERATE_DIR: ${{ github.workspace }}/deps/${{ matrix.target }}/generated/watermark
          OPENCV_DIR: ${{ github.workspace }}/deps/${{ matrix.target }}/opencv${{ case(runner.os == 'Linux' || runner.os == 'macOS', '/lib/cmake/opencv4', '') }}
        run: |
          cmake -B "${{ env.GENERATE_DIR }}" -DOpenCV_DIR="${{ env.OPENCV_DIR }}" -DCMAKE_BUILD_TYPE="${{ matrix.target }}" -DCMAKE_INSTALL_PREFIX="${{ env.BUILD_DIR }}" .
          cmake --build "${{ env.GENERATE_DIR }}" -j --config "${{ matrix.target }}" --target install
      - name: Test native watermark
        uses: threeal/ctest-action@v1.1.0
        with:
          build-config: ${{ matrix.target }}
          test-dir: ${{ github.workspace }}/deps/${{ matrix.target }}/generated/watermark
          verbose: true
      - name: Upload opencv artifacts
        uses: actions/upload-artifact@v6
        with:
          name: deps-opencv-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ github.ref_name }}
          path: ./deps/${{ matrix.target }}/opencv
          if-no-files-found: error
          retention-days: 1
          overwrite: true
      - name: Upload native watermark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: native-watermark-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ github.ref_name }}
          path: ./deps/${{ matrix.target }}/watermark
          if-no-files-found: error
          retention-days: 1
          overwrite: true
  prebuild-node-addon:
    needs: native-deps-build
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        node-version: [ '24.x' ]
    runs-on: ${{ matrix.os }}
    env:
      OPENCV_DIR: ${{ github.workspace }}/opencv
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version}}
          cache: pnpm
      - name: Download opencv deps
        uses: actions/download-artifact@v6
        with:
          name: deps-opencv-${{ runner.os}}-${{ runner.arch }}-Release-${{ github.ref_name }}
          path: ${{ env.OPENCV_DIR }}
      - run: pnpm ci
      - run: pnpm build --CDOpenCV_DIR=${{ env.OPENCV_DIR }}${{ env.OPENCV_SUFFIX }}
        env:
          OPENCV_SUFFIX: ${{ case(runner.os == 'Linux' || runner.os == 'macOS', '/lib/cmake/opencv4', '') }}
      - run: pnpm test
      - name: Upload native addon artifacts
        uses: actions/upload-artifact@v6
        with:
          name: addon-watermark-${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}
          path: ./addon
          if-no-files-found: error
          retention-days: 1
          overwrite: true
  bundle:
    name: Bundle prebuilds
    needs: prebuild-node-addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: addon-watermark-*
          path: tmp
      - name: Display structure of downloaded files
        run: |
          mkdir addon
          mv tmp/*/* addon/
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: image-freetype-node-addon
          path: addon
          retention-days: 7
